<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>To Do List</title>
</head>
<body>
    <center><h1>To Do List</h1></center>
    <form>
        <div class="container">
            <input type="hidden" type="number" id="userId" name="userId">
            <p>TaskName: <input id="taskName" name="taskName" type="text" placeholder="Task name"></p>
            <p>Description: <input id="description" name="description" type="text" placeholder="Description"></p>
            <center>
                <p><button id="saveBtn">Save Task</button></p>
                <p><button id="resetBtn">Reset Form</button></p>
            </center>
    </div>
    </form>
    <table>
        <thead>
            <tr>
                <th>Task Name</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/js/index.js"></script>
</body>
</html>
