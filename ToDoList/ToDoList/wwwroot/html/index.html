<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>To Do List</title>
</head>
<body>
    <h1>To Do List</h1>
    <div class="container">
        <p>TaskName: <input type="text" placeholder="Task name"></p>
        <p>Description: <input type="text" placeholder="Description"></p>
        <p>Create Date: <input type="Date" placeholder="Create Date"></p>
        <p><button id="saveBtn">Save Task</button></p>
        <p><button id="resetBtn">Reset Form</button></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Task Name</th>
                <th>Description</th>
                <th>Create Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/js/index.js"></script>
</body>
</html>
